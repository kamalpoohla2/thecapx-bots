# ─────────────────────────────────────────────────────────────────
#  WEEKLY OPTIMIZER — Runs every Sunday at 9:00 AM IST
#
#  What it does:
#    • Re-analyzes the website (picks up any site changes)
#    • Generates fresh content topics based on new analysis
#    • Runs a full publish cycle
# ─────────────────────────────────────────────────────────────────

name: Weekly Full Run

on:
  schedule:
    # Every Sunday at 3:30 AM UTC = 9:00 AM IST
    - cron: "30 3 * * 0"

  workflow_dispatch:

concurrency:
  group: weekly-optimizer
  cancel-in-progress: false

jobs:
  weekly-run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          MEDIUM_TOKEN=${{ secrets.MEDIUM_TOKEN }}
          DEVTO_API_KEY=${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN=${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID=${{ secrets.HASHNODE_PUBLICATION_ID }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          NOTIFICATION_EMAIL=${{ secrets.NOTIFICATION_EMAIL }}
          TARGET_SITE_URL=${{ secrets.TARGET_SITE_URL }}
          SITE_NAME=${{ secrets.SITE_NAME }}
          EOF

      - name: Re-analyze website
        run: python orchestrator.py run analyze

      - name: Generate new content
        run: python orchestrator.py run content

      - name: Publish content
        run: python orchestrator.py run publish

      - name: Final status
        if: always()
        run: python orchestrator.py status

      - name: Upload database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-state-${{ github.run_number }}
          path: bot_state.db
          retention-days: 14
